<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل مدیریت | AP Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="admin-container">
    <h1>🎮 پنل مدیریت AP Game</h1>
    
    <!-- ===== تنظیمات توکن ===== -->
    <div class="token-section">
      <h3>🔑 تنظیمات اتصال به گیت‌هاب</h3>
      <div class="form-group">
        <label>📝 توکن گیت‌هاب</label>
        <input type="password" id="githubToken" placeholder="توکن خود را وارد کنید...">
        <button class="btn-upload" onclick="saveToken()">💾 ذخیره توکن</button>
        <small style="color:#888; display:block; margin-top:5px;">توکن فقط توی مرورگر شما ذخیره میشه و جایی ارسال نمیشه.</small>
      </div>
      <div id="tokenStatus" style="color:#2ecc71; margin-top:5px;"></div>
    </div>

    <hr style="border-color:#2a2a4a; margin: 20px 0;">

    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="news">📰 مدیریت اخبار</button>
      <button class="tab-btn" data-tab="games">🎮 مدیریت بازی‌ها</button>
    </div>

    <!-- ===== بخش مدیریت اخبار ===== -->
    <div id="tab-news" class="tab-content active">
      <h2>📰 مدیریت اخبار</h2>
      
      <div class="admin-form">
        <h3>➕ افزودن خبر جدید</h3>
        <div class="form-group">
          <label>📌 عنوان خبر</label>
          <input type="text" id="newsTitle" placeholder="عنوان خبر را وارد کنید...">
        </div>
        <div class="form-group">
          <label>📝 خلاصه خبر</label>
          <input type="text" id="newsPreview" placeholder="خلاصه خبر (یک خط)...">
        </div>
        <div class="form-group">
          <label>📄 متن کامل خبر</label>
          <textarea id="newsFull" rows="5" placeholder="متن کامل خبر را وارد کنید..."></textarea>
        </div>
        <div class="form-group">
          <label>🏷️ برچسب</label>
          <select id="newsBadge">
            <option value="🔥 داغ">🔥 داغ</option>
            <option value="🆕 جدید">🆕 جدید</option>
            <option value="📰 خبر">📰 خبر</option>
          </select>
        </div>
        <div class="form-group">
          <label>🖼️ لینک عکس خبر</label>
          <input type="text" id="newsImage" placeholder="https://example.com/image.jpg">
        </div>
        <button class="btn-save" onclick="saveNewsToGitHub()">💾 ذخیره و ارسال به گیت‌هاب</button>
        <div id="newsStatus" style="margin-top:10px; color:#ffd700;"></div>
      </div>

      <div class="admin-list">
        <h3>📋 لیست اخبار (از گیت‌هاب)</h3>
        <div id="newsList">⏳ در حال بارگذاری...</div>
      </div>
    </div>

    <!-- ===== بخش مدیریت بازی‌ها ===== -->
    <div id="tab-games" class="tab-content">
      <h2>🎮 مدیریت بازی‌ها</h2>
      
      <div class="admin-form">
        <h3>➕ افزودن بازی جدید</h3>
        <div class="form-group">
          <label>🎮 نام بازی</label>
          <input type="text" id="gameTitle" placeholder="نام بازی را وارد کنید...">
        </div>
        <div class="form-group">
          <label>🏷️ ژانر</label>
          <select id="gameGenre">
            <option value="action">🎬 اکشن • جهان‌باز</option>
            <option value="adventure">🎨 ماجراجویی • خلاقیت</option>
            <option value="rpg">⚔️ RPG • سولزلایک</option>
            <option value="fps">🎯 FPS • تاکتیکی</option>
            <option value="moba">🏰 MOBA • استراتژی</option>
            <option value="social">🗣️ اجتماعی • پارانویا</option>
          </select>
        </div>
        <div class="form-group">
          <label>📝 خلاصه بازی</label>
          <input type="text" id="gamePreview" placeholder="خلاصه بازی (یک خط)...">
        </div>
        <div class="form-group">
          <label>📄 معرفی کامل</label>
          <textarea id="gameFull" rows="5" placeholder="متن کامل معرفی بازی را وارد کنید..."></textarea>
        </div>
        <div class="form-group">
          <label>🎯 مناسب برای</label>
          <input type="text" id="gameSuitable" placeholder="مثال: عاشقان دنیای باز و اکشن">
        </div>
        <div class="form-group">
          <label>🛒 لینک خرید</label>
          <input type="text" id="gameLink" placeholder="https://store.steampowered.com/...">
        </div>
        <div class="form-group">
          <label>🖼️ لینک عکس بازی</label>
          <input type="text" id="gameImage" placeholder="https://example.com/game.jpg">
        </div>
        <button class="btn-save" onclick="saveGameToGitHub()">💾 ذخیره و ارسال به گیت‌هاب</button>
        <div id="gameStatus" style="margin-top:10px; color:#ffd700;"></div>
      </div>

      <div class="admin-list">
        <h3>📋 لیست بازی‌ها (از گیت‌هاب)</h3>
        <div id="gamesList">⏳ در حال بارگذاری...</div>
      </div>
    </div>

  </div>

  <script>
    // ========================================== */
    // ===== تنظیمات ===== */
    // ========================================== */
    const REPO_OWNER = 'teamapcode';
    const REPO_NAME = 'AP-Game';
    const BRANCH = 'main';

    // ===== ذخیره توکن =====
    function saveToken() {
      const token = document.getElementById('githubToken').value.trim();
      if (!token) {
        alert('⚠️ لطفاً توکن را وارد کنید!');
        return;
      }
      localStorage.setItem('githubToken', token);
      document.getElementById('tokenStatus').textContent = '✅ توکن با موفقیت ذخیره شد!';
      document.getElementById('tokenStatus').style.color = '#2ecc71';
      loadNewsList();
      loadGamesList();
    }

    // ===== دریافت توکن =====
    function getToken() {
      return localStorage.getItem('githubToken');
    }

    // ========================================== */
    // ===== تابع خواندن فایل از گیت‌هاب ===== */
    // ========================================== */
    async function fetchFromGitHub(path) {
      const token = getToken();
      if (!token) {
        return { error: 'توکن وارد نشده است' };
      }

      try {
        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });

        if (response.status === 404) {
          return { data: [] };
        }

        if (!response.ok) {
          const error = await response.json();
          return { error: error.message || 'خطا در دریافت اطلاعات' };
        }

        const result = await response.json();
        const content = atob(result.content);
        return { data: JSON.parse(content), sha: result.sha };
      } catch (error) {
        return { error: error.message };
      }
    }

    // ========================================== */
    // ===== تابع نوشتن فایل در گیت‌هاب ===== */
    // ========================================== */
    async function saveToGitHub(path, data, sha) {
      const token = getToken();
      if (!token) {
        alert('⚠️ لطفاً ابتدا توکن گیت‌هاب را وارد کنید!');
        return { error: 'توکن وارد نشده است' };
      }

      try {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        
        const body = {
          message: `Update ${path} via admin panel`,
          content: content,
          branch: BRANCH
        };

        if (sha) {
          body.sha = sha;
        }

        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });

        if (!response.ok) {
          const error = await response.json();
          return { error: error.message || 'خطا در ذخیره اطلاعات' };
        }

        return { success: true };
      } catch (error) {
        return { error: error.message };
      }
    }

    // ========================================== */
    // ===== مدیریت اخبار ===== */
    // ========================================== */
    async function loadNewsList() {
      const container = document.getElementById('newsList');
      const status = document.getElementById('newsStatus');
      container.innerHTML = '⏳ در حال بارگذاری...';

      const result = await fetchFromGitHub('data/news.json');
      if (result.error) {
        container.innerHTML = `<p style="color:#ff6b6b;">⚠️ ${result.error}</p>`;
        return;
      }

      const news = result.data || [];
      if (news.length === 0) {
        container.innerHTML = '<p style="color:#888;">📭 هنوز خبری ثبت نشده است.</p>';
        return;
      }

      let html = '';
      for (let i = 0; i < news.length; i++) {
        const item = news[i];
        html += `
          <div class="admin-item">
            <div class="item-preview">
              <img src="${item.image}" alt="${item.title}">
              <div>
                <h4>${item.title}</h4>
                <p>${item.preview}</p>
                <small>📅 ${item.date || 'تاریخ نامشخص'}</small>
              </div>
            </div>
            <div class="item-actions">
              <button onclick="deleteNewsFromGitHub(${i})">🗑️</button>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    async function saveNewsToGitHub() {
      const status = document.getElementById('newsStatus');
      status.textContent = '⏳ در حال ذخیره...';
      status.style.color = '#ffd700';

      const title = document.getElementById('newsTitle').value.trim();
      const preview = document.getElementById('newsPreview').value.trim();
      const full = document.getElementById('newsFull').value.trim();
      const badge = document.getElementById('newsBadge').value;
      const image = document.getElementById('newsImage').value.trim();

      if (!title || !preview || !full) {
        status.textContent = '⚠️ لطفاً عنوان، خلاصه و متن کامل خبر را وارد کنید!';
        status.style.color = '#ff6b6b';
        return;
      }

      // دریافت لیست فعلی
      const result = await fetchFromGitHub('data/news.json');
      if (result.error && result.error !== 'توکن وارد نشده است') {
        status.textContent = `⚠️ ${result.error}`;
        status.style.color = '#ff6b6b';
        return;
      }

      const news = result.data || [];
      const sha = result.sha || null;

      // افزودن خبر جدید
      news.unshift({
        id: Date.now(),
        title: title,
        preview: preview,
        full: full,
        badge: badge,
        image: image || 'https://via.placeholder.com/600x300/1a1a2e/ffd700?text=خبر',
        date: new Date().toLocaleDateString('fa-IR'),
        timestamp: Date.now()
      });

      // ذخیره در گیت‌هاب
      const saveResult = await saveToGitHub('data/news.json', news, sha);
      if (saveResult.error) {
        status.textContent = `⚠️ ${saveResult.error}`;
        status.style.color = '#ff6b6b';
        return;
      }

      status.textContent = '✅ خبر با موفقیت در گیت‌هاب ذخیره شد!';
      status.style.color = '#2ecc71';
      
      // پاک کردن فرم
      document.getElementById('newsTitle').value = '';
      document.getElementById('newsPreview').value = '';
      document.getElementById('newsFull').value = '';
      document.getElementById('newsImage').value = '';
      
      // بارگذاری مجدد لیست
      await loadNewsList();
    }

    async function deleteNewsFromGitHub(index) {
      if (!confirm('آیا مطمئنی می‌خواهی این خبر را حذف کنی؟')) return;

      const status = document.getElementById('newsStatus');
      status.textContent = '⏳ در حال حذف...';
      status.style.color = '#ffd700';

      const result = await fetchFromGitHub('data/news.json');
      if (result.error) {
        status.textContent = `⚠️ ${result.error}`;
        status.style.color = '#ff6b6b';
        return;
      }

      const news = result.data || [];
      const sha = result.sha || null;
      news.splice(index, 1);

      const saveResult = await saveToGitHub('data/news.json', news, sha);
      if (saveResult.error) {
        status.textContent = `⚠️ ${saveResult.error}`;
        status.style.color = '#ff6b6b';
        return;
      }

      status.textContent = '✅ خبر با موفقیت حذف شد!';
      status.style.color = '#2ecc71';
      await loadNewsList();
    }

    // ========================================== */
    // ===== مدیریت بازی‌ها ===== */
    // ========================================== */
    async function loadGamesList() {
      const container = document.getElementById('gamesList');
      container.innerHTML = '⏳ در حال بارگذاری...';

      const result = await fetchFromGitHub('data/games.json');
      if (result.error) {
        container.innerHTML = `<p style="color:#ff6b6b;">⚠️ ${result.error}</p>`;
        return;
      }

      const games = result.data || [];
      if (games.length === 0) {
        container.innerHTML = '<p style="color:#888;">📭 هنوز بازی‌ای ثبت نشده است.</p>';
        return;
      }

      let html = '';
      for (let i = 0; i < games.length; i++) {
        const item = games[i];
        const genreNames = {
          'action': '🎬 اکشن',
          'adventure': '🎨 ماجراجویی',
          'rpg': '⚔️ RPG',
          'fps': '🎯 FPS',
          'moba': '🏰 MOBA',
          'social': '🗣️ اجتماعی'
        };
        html += `
          <div class="admin-item">
            <div class="item-preview">
              <img src="${item.image}" alt="${item.title}">
              <div>
                <h4>${item.title}</h4>
                <p>${genreNames[item.genre] || item.genre}</p>
                <small>${item.preview}</small>
              </div>
            </div>
            <div class="item-actions">
              <button onclick="deleteGameFromGitHub(${i})">🗑️</button>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    async function saveGameToGitHub() {
      const status = document.getElementById('gameStatus');
      status.textContent = '⏳ در حال ذخیره...';
      status.style.color = '#ffd700';

      const title = document.getElementById('gameTitle').value.trim();
      const genre = document.getElementById('gameGenre').value;
      const preview = document.getElementById('gamePreview').value.trim();
      const full = document.getElementById('gameFull').value.trim();
      const suitable = document.getElementById('gameSuitable').value.trim();
      const link = document.getElementById('gameLink').value.trim();
      const image = document.getElementById('gameImage').value.trim();

      if (!title || !preview || !full) {
        status.textContent = '⚠️ لطفاً نام، خلاصه و معرفی کامل بازی را وارد کنید!';
        status.style.color = '#ff6b6b';
        return;
      }

      const result = await fetchFromGitHub('data/games.json');
      if (result.error && result.error !== 'توکن وارد نشده است') {
        status.textContent = `⚠️ ${result.error}`;
        status.style.color = '#ff6b6b';
        return;
      }

      const games = result.data || [];
      const sha = result.sha || null;

      games.unshift({
        id: Date.now(),
        title: title,
        genre: genre,
        preview: preview,
        full: full,
        suitable: suitable || '🎯 مناسب برای: علاقه‌مندان به بازی',
        link: link || '#',
        image: image || 'https://via.placeholder.com/280x190/1a1a2e/ffd700?text=بازی',
        timestamp: Date.now()
      });

      const saveResult = await saveToGitHub('data/games.json', games, sha);
      if (saveResult.error) {
        status.textContent = `⚠️ ${saveResult.error}`;
        status.style.color = '#ff6b6b';
        return;
      }

      status.textContent = '✅ بازی با موفقیت در گیت‌هاب ذخیره شد!';
      status.style.color = '#2ecc71';
      
      document.getElementById('gameTitle').value = '';
      document.getElementById('gamePreview').value = '';
      document.getElementById('gameFull').value = '';
      document.getElementById('gameSuitable').value = '';
      document.getElementById('gameLink').value = '';
      document.getElementById('gameImage').value = '';
      
      await loadGamesList();
    }

    async function deleteGameFromGitHub(index) {
      if (!confirm('آیا مطمئنی می‌خواهی این بازی را حذف کنی؟')) return;

      const status = document.getElementById('gameStatus');
      status.textContent = '⏳ در حال حذف...';
      status.style.color = '#ffd700';

      const result = await fetchFromGitHub('data/games.json');
      if (result.error) {
        status.textContent = `⚠️ ${result.error}`;
        status.style.color = '#ff6b6b';
        return;
      }

      const games = result.data || [];
      const sha = result.sha || null;
      games.splice(index, 1);

      const saveResult = await saveToGitHub('data/games.json', games, sha);
      if (saveResult.error) {
        status.textContent = `⚠️ ${saveResult.error}`;
        status.style.color = '#ff6b6b';
        return;
      }

      status.textContent = '✅ بازی با موفقیت حذف شد!';
      status.style.color = '#2ecc71';
      await loadGamesList();
    }

    // ===== مدیریت تب‌ها =====
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const tab = this.dataset.tab;
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        
        if (tab === 'news') loadNewsList();
        if (tab === 'games') loadGamesList();
      });
    });

    // ===== بارگذاری اولیه =====
    document.addEventListener('DOMContentLoaded', function() {
      const savedToken = localStorage.getItem('githubToken');
      if (savedToken) {
        document.getElementById('tokenStatus').textContent = '✅ توکن قبلاً ذخیره شده است.';
        document.getElementById('tokenStatus').style.color = '#2ecc71';
        loadNewsList();
        loadGamesList();
      }
    });
  </script>

</body>
</html>
